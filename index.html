<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>BLOCK BATTLE!!</title>
    <script src="phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">

    var config = {
        type: Phaser.AUTO,
        width: 1000,
        height: 600,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 500 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('background', 'assets/background_one.png');
        this.load.image('ground', 'assets/ground.png')
        this.load.image('platform1', 'assets/platform.png')

    }
    
    var platforms
    function create ()
    {
        platforms = this.physics.add.staticGroup();

        const bg = this.add.image(500, 300, 'background');
        bg.setDisplaySize(this.scale.width, this.scale.height);

        
        const ground = platforms.create(500, 450, 'ground');
        ground.setDisplaySize(this.scale.width, 300); // make it wide like a floor
        ground.refreshBody();
        const platform = platforms.create(700, 400, 'platform1');
        platform.setDisplaySize(this.scale.width/2, this.scale.height/2);
        platform.refreshBody();

    }

    function update ()
    {
    }

</script>

</body>
</html>
