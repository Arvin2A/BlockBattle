<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>BLOCK BATTLE!!</title>
    <script src="phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    var config = {
        type: Phaser.AUTO,
        width: 1000,
        height: 600,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 500 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('background', 'assets/background_one.png');
        this.load.image('ground', 'assets/ground.png')
        this.load.image('platform1', 'assets/platform1.png')
        this.load.image('axeman', 'assets/character1.png')
        this.load.image('swordman', 'assets/character2.png')
        this.load.image('groundhitbox', 'assets/groundhitbox.png')
        this.load.spritesheet('axeatk', 'assets/axeatk1.png', {
            frameWidth: 50,
            frameHeight: 50
        });
        this.load.spritesheet('swordatk', 'assets/swordatk1.png', {
            frameWidth: 50,
            frameHeight: 50
        });
    }
    
    var platforms
    var players = {
        player: null,
        player2: null
    }

    var player
    var cursors

    var wasd 
    var attackKey1
    var attackKey2

    function attackIsElligible(attacker, target) {
        if (!attacker.canAttack || attacker.hitstun) return false;

        const dx = target.x - attacker.x;
        const dy = target.y - attacker.y;
        const distance = Math.hypot(dx, dy);
        return distance <= 100; // Attack range
    }
    function attack(scene, attacker, target, animKey) {

        if (!attacker.canAttack || attacker.hitstun) return;

        attacker.atk.setVisible(true);
        attacker.atk.x = attacker.x + attacker.lastDir.x * 50;
        attacker.atk.y = attacker.y + attacker.lastDir.y * 50;

        attacker.atk.setFlipX(-attacker.lastDir.x < 0);

        attacker.atk.setFrame(0);
        attacker.atk.play(animKey, true);

        let hit = false;

        if (attackIsElligible(attacker, target)) {
            hit = true;

            target.hitstun = true;
            target.freeze = true;
            attacker.freeze = true;
            attacker.comboTimer = 600;

            const dirX = attacker.lastDir.x;
            const dirY = attacker.lastDir.y;
            scene.time.delayedCall(50, () => {
                console.log(dirX, dirY);
                target.setVelocityX(300 * dirX);
                target.setVelocityY(300 * dirY);
            });
            
        }

        if (hit) {
            attacker.combo = (attacker.combo || 0) + 1;
            target.setVelocityX(0);
            target.setVelocityY(0);
            attacker.setVelocityX(0);
            attacker.setVelocityY(0);
        } else {
            attacker.combo = 0;
        }

        if (attacker.combo >= 3) {
            attacker.combo = 0;
        }

        attacker.canAttack = false;

        scene.time.delayedCall(150, () => {
            attacker.atk.stop();
            attacker.atk.setVisible(false);
        });

        scene.time.delayedCall(400, () => {
            attacker.canAttack = true;
            target.hitstun = false;
            target.freeze = false;
            attacker.freeze = false;
        });
    }
    function thirdAttack(scene, attacker, target, animKey) {

        attacker.atk.setVisible(true);
        attacker.atk.x = attacker.x + attacker.lastDir.x * 50;
        attacker.atk.y = attacker.y + attacker.lastDir.y * 50;

        attacker.atk.setFlipX(-attacker.lastDir.x < 0);

        //animation

        attacker.atk.setFrame(0);
        attacker.atk.play(animKey, true);
        console.log("Third Attack!");
        if (attackIsElligible(attacker, target)) {
            target.hitstun = true;
            target.freeze = false;
            attacker.freeze = false;
            attacker.comboTimer = 600;
            const dirX = attacker.lastDir.x;

            let dirY = -1;
            if (dirY === 0) dirY = -1; //always launch upwards if on same level

            //very stronk knockback
            target.setVelocityX(500 * dirX);
            target.setVelocityY(-500);
        }
        attacker.canAttack = false;
        scene.time.delayedCall(180, () => {
            attacker.atk.stop();
            attacker.atk.setVisible(false);
        });
        scene.time.delayedCall(400, () => {
            attacker.canAttack = true;
            target.hitstun = false;
        });
    }

    function updateCombo(player, dt) {
        if (player.combo > 0) {
            player.comboTimer -= dt;
            if (player.comboTimer <= 0) {
                player.combo = 0;
                player.comboTimer = 0;
            }
        }
    }
    function create () {
        platforms = this.physics.add.staticGroup();

        const bg = this.add.image(500, 300, 'background');
        bg.setDisplaySize(this.scale.width, this.scale.height);

        const groundVisual = this.add.image(500, 450, 'ground');
        groundVisual.setDisplaySize(this.scale.width, 300);

        // Invisible collision ground
        const ground = platforms.create(500, 575, 'groundhitbox');
        ground.setDisplaySize(this.scale.width, 0);
        ground.setVisible(false);
        ground.refreshBody();

        const ground2 = platforms.create(800, 470, 'groundhitbox');
        ground2.setDisplaySize(this.scale.width/2, 0);
        ground2.setVisible(true);
        ground2.refreshBody();

        const platform = this.add.image(800, 425, 'platform1');
        platform.setScale(0.5);
        //platform.refreshBody();
        this.anims.create({
            key: 'axeatk',
            frames: this.anims.generateFrameNumbers('axeatk', { start: 0, end: 3 }),
            frameRate: 16,
            repeat: 0
        });

        this.anims.create({
            key: 'swordatk',
            frames: this.anims.generateFrameNumbers('swordatk', { start: 0, end: 3 }),
            frameRate: 16,
            repeat: 0
        });

        //---PLAYER---\\

        players.player = this.physics.add.sprite(50, 500, 'axeman');    
        players.player.setCollideWorldBounds(true);

        players.player2 = this.physics.add.sprite(800, 420, 'swordman');    
        players.player2.setCollideWorldBounds(true);

        players.player.canAttack = true;
        players.player2.canAttack = true;

        players.player.hitstun = false;
        players.player2.hitstun = false;

        players.player.freeze = false;
        players.player2.freeze = false;

        players.player.combo = 0;
        players.player2.combo = 0;
        
        players.player.comboTimer = 0;
        players.player2.comboTimer = 0;

        players.player.lastDir = { x: 1, y: 0 };
        players.player2.lastDir = { x: -1, y: 0 };

        players.player.atk = this.add.sprite(
            players.player.x + (players.player.lastDir.x * 50),
            players.player.y + (players.player.lastDir.y * 50),
            'axeatk'
        );

        players.player2.atk = this.add.sprite(
            players.player2.x + (players.player2.lastDir.x * 50),
            players.player2.y + (players.player2.lastDir.y * 50),
            'swordatk'
        );

        players.player.atk.setVisible(false);
        players.player2.atk.setVisible(false);

        //---CONTROLS---\\
        attackKey1 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
        attackKey2 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SHIFT);
        this.input.keyboard.on('keydown-E', () => {
            const attacker = players.player;
            const target = players.player2;
            if (attacker.combo >= 2) {
                thirdAttack(this, attacker, target, 'axeatk');
            } else {
                attack(this, attacker, target, 'axeatk');
            }
        });
        this.input.keyboard.on('keydown-SHIFT', () => {
            const attacker = players.player2;
            const target = players.player;

            if (attacker.combo >= 2) {
                thirdAttack(this, attacker, target, 'swordatk');
            } else {
                attack(this, attacker, target, 'swordatk');
            }
        });

        for (const key in players) {
            const player = players[key];
            this.physics.add.collider(player, platforms);
        }
        const keys = Object.keys(players);

        for (let i = 0; i < keys.length; i++) {
            for (let j = i + 1; j < keys.length; j++) {
                const playerA = players[keys[i]];
                const playerB = players[keys[j]];
                this.physics.add.collider(playerA, playerB);
            }
        }

        cursors = this.input.keyboard.createCursorKeys();
        wasd = this.input.keyboard.addKeys({ up: 'W', left: 'A', down: 'S', right: 'D' });
    }

    function update () {
        if (players.player.freeze) {
            players.player.setVelocityX(0);
            players.player.setVelocityY(0);
        }
        if (players.player2.freeze) {
            players.player2.setVelocityX(0);
            players.player2.setVelocityY(0);
        }
        updateCombo(players.player, this.game.loop.delta);
        updateCombo(players.player2, this.game.loop.delta);
        if (wasd.left.isDown) players.player.lastDir = { x: -1, y: 0 };
        else if (wasd.right.isDown) players.player.lastDir = { x: 1, y: 0 };
        else if (wasd.up.isDown) players.player.lastDir = { x: 0, y: -1 };
        else if (wasd.down.isDown) players.player.lastDir = { x: 0, y: 1 };

        // PLAYER 2 (arrows)
        if (cursors.left.isDown) players.player2.lastDir = { x: -1, y: 0 };
        else if (cursors.right.isDown) players.player2.lastDir = { x: 1, y: 0 };
        else if (cursors.up.isDown) players.player2.lastDir = { x: 0, y: -1 };
        else if (cursors.down.isDown) players.player2.lastDir = { x: 0, y: 1 };
        function decelerateAll() {
            for (const key in players) {
                const player = players[key];
                let vx = player.body.velocity.x;

                if (Math.abs(vx) > 10) {
                    player.setVelocityX(vx * 0.9);
                } else {
                    player.setVelocityX(0);
                }
            }
        }
        function decelerate(player) {
            let vx = player.body.velocity.x;

            if (Math.abs(vx) > 10) {
                player.setVelocityX(vx * 0.9);
            } else {
                player.setVelocityX(0);
            }
        }
        players.player.atk.x = players.player.x + (players.player.lastDir.x * 50);
        players.player.atk.y = players.player.y + (players.player.lastDir.y * 50);

        players.player2.atk.x = players.player2.x + (players.player2.lastDir.x * 50);
        players.player2.atk.y = players.player2.y + (players.player2.lastDir.y * 50);

        if (!players.player.hitstun) {
            if (wasd.left.isDown) {
                players.player.setVelocityX(-160);
            }
            else if (wasd.right.isDown) {
                players.player.setVelocityX(160);
            }
            else {
                if (!players.player.hitstun) {
                    decelerate(players.player);
                }
            }
            if (wasd.up.isDown && players.player.body.touching.down) {
                players.player.setVelocityY(-400);
            }
            if (wasd.up.isUp && players.player.body.velocity.y < 0) {
                players.player.setVelocityY(players.player.body.velocity.y / 2);
            }
        }
        

        if (!players.player2.hitstun) {

            //Player 2 controls
            if (cursors.left.isDown) {
                players.player2.setVelocityX(-160);
            }
            else if (cursors.right.isDown) {
                players.player2.setVelocityX(160);
            }
            else {
                if (!players.player2.hitstun) {
                    decelerate(players.player2);
                }
            }
            if (cursors.up.isDown && players.player2.body.touching.down) {
                players.player2.setVelocityY(-400);
            }
            if (cursors.up.isUp && players.player2.body.velocity.y < 0) {
                players.player2.setVelocityY(players.player2.body.velocity.y / 2);
            }
        }
    }

</script>

</body>
</html>
