    function attackIsElligible(attacker, target) {
        if (!attacker.canAttack || attacker.hitstun) return false;
        const dx = target.x - attacker.x;
        const dy = target.y - attacker.y;
        const distance = Math.hypot(dx, dy);
        if (distance > 100) return false; // Too far away

        const dirToTargetX = dx/distance;
        const dirToTargetY = dy/distance;

        const dot = dirToTargetX * attacker.lastDir.x + dirToTargetY * attacker.lastDir.y;
        //dot product checks if the attacker is facing the target, which is the general rule for attacks in this game
        //However, to add some depth and counterplay, I added two custom rules for fun
        const isFacingUp = attacker.lastDir.y < -0.9 && Math.abs(attacker.lastDir.x) < 0.2;
        const isFacingDown = attacker.lastDir.y > 0.9 && Math.abs(attacker.lastDir.x) < 0.2;
        //technically, decimal values are useless, because the values are only 0, 1, or -1
        //but this just adds a bit of leniency just in case we add mobile or controller support later where the input might not be perfectly digital
        const isTargetAbove = dy < -10;
        const isAttackerAbove = dy > 10;
        const una = isAttackerAbove && isFacingUp; // CUSTOM RULE: Prevent attacking upwards and pulling the player under the attacker
        const una2 = isFacingDown && isTargetAbove; // SECOND CUSTOM RULE: Prevent attacking downwards if the target is above also to avoid pinning
        if (una) return false;
        if (una2) return false;
        return dot > 0.7 || isFacingUp || isTargetAbove ; // Attack range and facing target
    }
    function attack(scene, attacker, target, animKey) {
        //the core attack function that is used as of now
        if (!attacker.canAttack || attacker.hitstun) return;

        attacker.atk.setVisible(true);
        attacker.atk.x = attacker.x + attacker.lastDir.x * 50;
        attacker.atk.y = attacker.y + attacker.lastDir.y * 50;

        attacker.atk.setFlipX(-attacker.lastDir.x < 0);

        if (attacker.lastDir.y < 0) {
            attacker.atk.setAngle(90);
        } else if (attacker.lastDir.y > 0) {
            attacker.atk.setAngle(-90);
        } else {
            attacker.atk.setAngle(0);
        }

        attacker.atk.setFrame(0);
        attacker.atk.play(animKey, true);
        if (attacker.body.touching.down) {
            attacker.freeze = true;
        }

        let hit = false;


        if (attackIsElligible(attacker, target)) {
            hit = true;

            target.hitstun = true;
            target.freeze = true;
            attacker.freeze = true;
            attacker.willDecelerate = false;
            attacker.comboTimer = 600;

            const dirX = attacker.lastDir.x;
            const dirY = attacker.lastDir.y;
            scene.time.delayedCall(50, () => {
                console.log(dirX, dirY);
                target.setVelocityX((300 * target.KBmultiplier) * dirX);
                target.setVelocityY((300 * target.KBmultiplier) * dirY);
            });
            
        }

        if (hit) {
            attacker.combo = (attacker.combo || 0) + 1;
            target.setVelocityX(0);
            target.setVelocityY(0);
            attacker.setVelocityX(0);
            attacker.setVelocityY(0);
            scene.sound.play('anyhit');
            target.KBmultiplier += 0.03; // Increase KB multiplier for third hit
        } else {
            attacker.combo = 0;
            scene.sound.play('miss');
        }

        if (attacker.combo >= 3) {
            attacker.combo = 0;
        }

        attacker.canAttack = false;

        scene.time.delayedCall(150, () => {
            attacker.atk.stop();
            attacker.atk.setVisible(false);
        });
        if (attacker.revokeAggressorStun) scene.time.removeEvent(attacker.revokeAggressorStun);
        if (target.revokeVictimStun) scene.time.removeEvent(target.revokeVictimStun);
        attacker.revokeAggressorStun = scene.time.delayedCall(400, () => {
            attacker.canAttack = true;
            attacker.freeze = false;
            attacker.willDecelerate = true;
        });
        target.revokeVictimStun = scene.time.delayedCall(500, () => {
            target.hitstun = false;
            target.freeze = false;
            target.willDecelerate = true;
        });
        
    }

    function updateCombo(player, dt) {
        if (player.combo > 0) {
            player.comboTimer -= dt;
            if (player.comboTimer <= 0) {
                player.combo = 0;
                player.comboTimer = 0;
            }
        }
    }
    function tryAttack(scene, attacker, target, animKey, thirdAnimKey) {
        //handles some other stuff before calling either attack functions
        //such as checking if the attack is on cooldown, and whether to use the third attack or not
        if (scene.time.now < attacker.nextAttackTime) return;
        if (!attacker.canAttack || attacker.hitstun) return;

        if (attacker.combo >= 2) {
            thirdAttack(scene, attacker, target, thirdAnimKey);
        } else {
            attack(scene, attacker, target, animKey);
        }
        attacker.nextAttackTime = scene.time.now + 400; // Attack cooldown
    }
    function tryLunge(scene, player, direction, currentTime, animKey = 'swordatk') {
        //LUNGE: exclusive for the swordsman, this is performed by double tapping left or right
        // It launches the player forward in the direction they are lunging in
        //Why do this? Using arrow keys and right shift is harder than using WASD and E
        //Basically it balances out the controls.
        const dtapDelay = 250;
        const lungecd = 4000;

        if (player.hitstun || player.freeze) return;
        if (currentTime < player.nextLungeTime) return;
        
        //animation

        player.atk.setFrame(0);
        player.atk.play(animKey, true);
        if (currentTime - player.lastTap[direction] < dtapDelay) {
            player.atk.setVisible(true);
            player.atk.x = player.x + player.lastDir.x * 50;
            player.atk.y = player.y + player.lastDir.y * 50;

            player.atk.setFlipX(-player.lastDir.x < 0);
            player.isLunging = true;

            if (player.lastDir.y < 0) {
                player.atk.setAngle(90);
            } else if (player.lastDir.y > 0) {
                player.atk.setAngle(-90);
            } else {
                player.atk.setAngle(0);
            }
            const lspeed = 600;
            if (direction === 'left') {
                player.setVelocityX(-lspeed);
            } else if (direction === 'right') {
                player.setVelocityX(lspeed);
            }

            player.nextLungeTime = currentTime + lungecd;
            scene.sound.play('lunge');

            scene.time.delayedCall(400, () => {
                player.isLunging = false;
            });
            
            scene.time.delayedCall(400, () => {
                player.atk.stop();
                player.atk.setVisible(false);
            });
        }
        player.lastTap[direction] = currentTime; 
        
    }
    function tryCleave(scene, player, direction, currentTime) {
        const dtapDelay = 250;
        const cleaveCD = 3000;

        if (player.hitstun || player.freeze) return;
        if (currentTime < player.nextCleaveTime) return;

        if (currentTime - player.lastTap[direction] < dtapDelay) {

            player.isCleaving = true;
            player.hasHitCleave = false;

            const speed = 400; 

            if (direction === 'left') {
                player.setVelocityX(-speed);
                player.lastDir = { x: -1, y: 0 };
            } else {
                player.setVelocityX(speed);
                player.lastDir = { x: 1, y: 0 };
            }

            // Use third attack animation (hard to hit, so discarded)
            //thirdAttack(scene, player, players.player2, 'axeatkthird');

            scene.time.delayedCall(200, () => {
                player.isCleaving = false;
            });

            player.nextCleaveTime = currentTime + cleaveCD;
        }

        player.lastTap[direction] = currentTime;
    }

        players.player2.hitstun = false;

        players.player.freeze = false;
        players.player2.freeze = false;

        players.player.willDecelerate = true;
        players.player2.willDecelerate = true;

        players.player.nextAttackTime = 0;
        players.player2.nextAttackTime = 0;

        players.player.combo = 0;
        players.player2.combo = 0;
        
        players.player.comboTimer = 0;
        players.player2.comboTimer = 0;
        
        players.player.winNumber = 0;
        players.player2.winNumber = 0;

        players.player.winText = this.add.text(400, 300, '', {
            fontFamily: 'VCROSD',
            fontSize: '48px',
            fill: '#FFFFFF'
        }).setOrigin(0.5).setStroke('#000000', 4).setVisible(false);

        players.player2.winText = this.add.text(600, 300, '', {
            fontFamily: 'VCROSD',
            fontSize: '48px',
            fill: '#FFFFFF'
        }).setOrigin(0.5).setStroke('#000000', 4).setVisible(false);

        players.player.outOfBounds = false;
        players.player2.outOfBounds = false;

        players.player.airTime = 0;
        players.player2.airTime = 0;

        players.player.KBmultiplier = 1.00;
        players.player2.KBmultiplier = 1.00;

        players.player2.nextLungeTime = 0; //swordman special: lunge, can be used to get back on stage quick or ambushes.
        players.player2.lastTap = { left: 0, right: 0 };
        players.player2.isLunging = false

        players.player.nextCleaveTime = 0; //axeman special: cleave, a small dash but deals damage
        players.player.lastTap = { left: 0, right: 0 };
        players.player.isCleaving = false;
        players.player.hasHitCleave = false;

        players.player.lastDir = { x: 1, y: 0 };
        players.player2.lastDir = { x: -1, y: 0 };

        players.player.atk = this.add.sprite(
            players.player.x + (players.player.lastDir.x * 50),
            players.player.y + (players.player.lastDir.y * 50),
            'axeatk'
        );

        players.player2.atk = this.add.sprite(
            players.player2.x + (players.player2.lastDir.x * 50),
            players.player2.y + (players.player2.lastDir.y * 50),
            'swordatk'
        );

        players.player.atk.setVisible(false);
        players.player2.atk.setVisible(false);

        //---CONTROLS---\\
        //Allows holding for the keys too. Later this will be revamped to allow charge attacks
        attackKey1 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
        attackKey2 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SHIFT);

        for (const key in players) {
            const player = players[key];
            this.physics.add.collider(player, platforms);
        }
        const keys = Object.keys(players);

        for (let i = 0; i < keys.length; i++) {
            for (let j = i + 1; j < keys.length; j++) {
                const playerA = players[keys[i]];
                const playerB = players[keys[j]];
                this.physics.add.collider(playerA, playerB);
            }
        }

        cursors = this.input.keyboard.createCursorKeys();
        wasd = this.input.keyboard.addKeys({ up: 'W', left: 'A', down: 'S', right: 'D' });

        //load icons for the KB stat display
        const plr1Icon = this.add.image(250, 65, players.player.icon);
        const plr2Icon = this.add.image(650, 65, players.player2.icon);

        //Set player names and KB text
        players.player.name = "AXEMAN";
        players.player2.name = "SWORDMAN";

        const plr1NameText = this.add.text(280, 47, players.player.name, {fontFamily: 'GameFont', fontSize: '10px', fill: '#FFFFFF'});
        const plr2NameText = this.add.text(680, 47, players.player2.name, {fontFamily: 'GameFont', fontSize: '10px', fill: '#FFFFFF'});
        plr1NameText.setStroke('#000000', 3);
        plr2NameText.setStroke('#000000', 3);

        players.player.KBText = this.add.text(285, 65, 'KB: 1.00', {fontFamily: 'GameFont', fontSize: '14px', fill: '#FFFFFF'});
        players.player2.KBText = this.add.text(685, 65, 'KB: 1.00', {fontFamily: 'GameFont', fontSize: '14px', fill: '#FFFFFF'});
        players.player.KBText.setStroke('#000000', 3);
        players.player2.KBText.setStroke('#000000', 3);
    }
    function updateWins(scene) {
        if (players.player.winNumber !== lastWinState.p1 || players.player2.winNumber !== lastWinState.p2) {
            console.log("update!")
           lastWinState.p1 = players.player.winNumber;
           lastWinState.p2 = players.player2.winNumber;

           winBar.setVisible(true);
            scene.tweens.add({
                targets: winBar,
                scaleY: 1, // from 0 → full height
                duration: 300,
                ease: 'Cubic.easeOut'
            });
            scene.time.delayedCall(1000, () => {
                players.player.winText.setVisible(false);
                players.player2.winText.setVisible(false);
                scene.tweens.add({
                    targets: winBar,
                    scaleY: 0, // from 0 → full height
                    duration: 300,
                    ease: 'Cubic.easeOut'
                });
            });

            players.player.winText.setText(players.player.winNumber);
            players.player2.winText.setText(players.player2.winNumber);
            players.player.winText.setVisible(true);
            players.player2.winText.setVisible(true);
            
        }
    }
    function teleportBackToArena(player) {
        player.setPosition(500, 0)
        player.setVelocityY(0)
    }
    const accelFactor = 20
    function update () {
        //why put these in an update loop?
        //In this game there are a lot of different states and mechanics that need to be updated in real time, 
        // such as player's movement, attacks, acting upon hitstun/freeze, checking for win conditions, and more.
        //---STATE UPDATES---\\
        if (gameEnded) {
            players.player.setVelocityX(0);
            players.player.setVelocityY(0);
            players.player2.setVelocityX(0);
            players.player2.setVelocityY(0);
            return
        }
        if (attackKey1.isDown && !players.player.hitstun) {
            tryAttack(this, players.player, players.player2, 'axeatk', 'axeatkthird');
        }
        if (attackKey2.isDown && !players.player2.hitstun) {
            tryAttack(this, players.player2, players.player, 'swordatk', 'swordatkthird');
        }
        players.player.outOfBounds = players.player.y > 700 || players.player.x < -200 || players.player.x > 1200 || players.player.y < -200;
        players.player2.outOfBounds = players.player2.y > 700 || players.player2.x < -200 || players.player2.x > 1200 || players.player2.y < -200;
        
        for (const key in players) {
            const player = players[key];
            
            if (player.body.touching.down) {
                player.airTime = 0;
            } else {
                player.airTime += this.game.loop.delta;
            }
        };
        players.player.KBText.setText('KB: ' + players.player.KBmultiplier.toFixed(2));
        players.player2.KBText.setText('KB: ' + players.player2.KBmultiplier.toFixed(2));
        updateCombo(players.player, this.game.loop.delta);
        updateCombo(players.player2, this.game.loop.delta);
        if (wasd.left.isDown) players.player.lastDir = { x: -1, y: 0 };
        else if (wasd.right.isDown) players.player.lastDir = { x: 1, y: 0 };
        else if (wasd.up.isDown) players.player.lastDir = { x: 0, y: -1 };
        else if (wasd.down.isDown) players.player.lastDir = { x: 0, y: 1 };

        // PLAYER 2 (arrows)
        if (cursors.left.isDown) players.player2.lastDir = { x: -1, y: 0 };
        else if (cursors.right.isDown) players.player2.lastDir = { x: 1, y: 0 };
        else if (cursors.up.isDown) players.player2.lastDir = { x: 0, y: -1 };
        else if (cursors.down.isDown) players.player2.lastDir = { x: 0, y: 1 };
        function decelerateAll() {
            for (const key in players) {
                const player = players[key];
                let vx = player.body.velocity.x;

                if (Math.abs(vx) > 10) {
                    player.setVelocityX(vx * 0.9);
                } else {
                    player.setVelocityX(0);
                }
            }
        }
        function decelerate(player) {
            if (player.isLunging) return; 
            let vx = player.body.velocity.x;

            if (Math.abs(vx) > 10) {
                player.setVelocityX(vx * 0.9);
            } else {
                player.setVelocityX(0);
            }
        }
        players.player.atk.x = players.player.x + (players.player.lastDir.x * 50);
        players.player.atk.y = players.player.y + (players.player.lastDir.y * 50);

        players.player2.atk.x = players.player2.x + (players.player2.lastDir.x * 50);
        players.player2.atk.y = players.player2.y + (players.player2.lastDir.y * 50);

        if (!players.player.hitstun) {
            if (Phaser.Input.Keyboard.JustDown(wasd.left)) {
                tryCleave(this, players.player, 'left', this.time.now);
            }
            if (Phaser.Input.Keyboard.JustDown(wasd.right)) {
                tryCleave(this, players.player, 'right', this.time.now);
            }
            if (!players.player.hasHitCleave && players.player.isCleaving) {
                superSwing(this, players.player, players.player2, 'axeatkthird');
                players.player.hasHitCleave = true;
            } 
            if (wasd.left.isDown) {
                if (!players.player.isCleaving) {
                    players.player.setVelocityX(Phaser.Math.Clamp(players.player.body.velocity.x - accelFactor, -250, 250));
                }
            } else if (wasd.right.isDown) {
                if (!players.player.isCleaving) {
                    players.player.setVelocityX(Phaser.Math.Clamp(players.player.body.velocity.x + accelFactor, -250, 250));
                }
            } else {
                if (players.player.willDecelerate) {
                    decelerate(players.player);
                }
            }
            if (wasd.up.isDown && players.player.body.touching.down) {
                players.player.setVelocityY(-400);
            }
            if (wasd.up.isUp && players.player.body.velocity.y < 0) {
                players.player.setVelocityY(players.player.body.velocity.y / 2);
            }
            if (wasd.down.isDown && players.player.airTime > 600) {
                players.player.setVelocityY(800);
            }
        }
        

        if (!players.player2.hitstun) {

            //Player 2 controls
            if (Phaser.Input.Keyboard.JustDown(cursors.left)) {
                tryLunge(this, players.player2, 'left', this.time.now);
            }
            if (Phaser.Input.Keyboard.JustDown(cursors.right)) {
                tryLunge(this, players.player2, 'right', this.time.now);
            }
            if (cursors.left.isDown) {
                if (!players.player2.isLunging) {
                    players.player2.setVelocityX(Phaser.Math.Clamp(players.player2.body.velocity.x - accelFactor, -250, 250));
                }
            }
            else if (cursors.right.isDown) {
                if (!players.player2.isLunging) {
                    players.player2.setVelocityX(Phaser.Math.Clamp(players.player2.body.velocity.x + accelFactor, -250, 250));
                }
            }
            else {
                if (players.player2.willDecelerate) {
                    decelerate(players.player2);
                }
            }
            if (cursors.up.isDown && players.player2.body.touching.down) {
                players.player2.setVelocityY(-400);
            }
            if (cursors.up.isUp && players.player2.body.velocity.y < 0) {
                players.player2.setVelocityY(players.player2.body.velocity.y / 2);
            }
            if (cursors.down.isDown && players.player2.airTime > 600) {
                players.player2.setVelocityY(800);
            }
        }
        //PRIORITY
        if (players.player.freeze) {
            players.player.setVelocityX(0);
            players.player.setVelocityY(0);
        }
        if (players.player2.freeze) {
            players.player2.setVelocityX(0);
            players.player2.setVelocityY(0);
        }

        //WIN CONDITION -- DETECT IF PLAYER IS LAUNCHED FAR OFF SCREEN

        if (!gameEnded) {
            
            if (players.player.outOfBounds) {
                players.player2.winNumber = players.player2.winNumber + 1;
                console.log(players.player2.winNumber)
                updateWins(this)
                teleportBackToArena(players.player)
            } else if (players.player2.outOfBounds) {
                players.player.winNumber = players.player.winNumber + 1;
                updateWins(this)
                teleportBackToArena(players.player2)
            }
            
            if (players.player.winNumber >= winNumber || players.player2.winNumber >= winNumber) {
                if (players.player.outOfBounds) {
                    gameEnded = true;
                    this.add.text(500, 400, players.player2.name + ' WINS!', {fontFamily: 'GameFont', fontSize: '32px', fill: '#00008B'}).setOrigin(0.5).setStroke('#000000', 5);
                } else if (players.player2.outOfBounds) {
                    gameEnded = true;
                    this.add.text(500, 400, players.player.name + ' WINS!', {fontFamily: 'GameFont', fontSize: '32px', fill: '#8B0000'}).setOrigin(0.5).setStroke('#000000', 5);
                }
            } 
        }

        
    }

</script>
