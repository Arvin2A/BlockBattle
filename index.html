<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>BLOCK BATTLE!!</title>
    <script src="phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">

    var config = {
        type: Phaser.AUTO,
        width: 1000,
        height: 600,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 500 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('background', 'assets/background_one.png');
        this.load.image('ground', 'assets/ground.png')
        this.load.image('platform1', 'assets/platform.png')
        this.load.image('axeman', 'assets/character1.png')
        this.load.image('groundhitbox', 'assets/groundhitbox.png')
    }
    
    var platforms
    var player
    var cursors
    function create () {
        platforms = this.physics.add.staticGroup();

        const bg = this.add.image(500, 300, 'background');
        bg.setDisplaySize(this.scale.width, this.scale.height);

        const groundVisual = this.add.image(500, 450, 'ground');
        groundVisual.setDisplaySize(this.scale.width, 300);

        // Invisible collision ground
        const ground = platforms.create(500, 575, 'groundhitbox');
        ground.setScale(this.scale.width / ground.width, 1);
        ground.setVisible(false);
        ground.refreshBody();
        
        const platform = platforms.create(800, 475, 'platform1');
        platform.setScale(0.5);
        platform.refreshBody();

        player = this.physics.add.sprite(50, 350, 'axeman');    
        player.setCollideWorldBounds(true);

        this.physics.add.collider(player, platforms);

        cursors = this.input.keyboard.createCursorKeys();
    }

    function update () {
        if (cursors.left.isDown) {
            player.setVelocityX(-160);
        }
        else if (cursors.right.isDown) {
            player.setVelocityX(160);
        }
        else {
            player.setVelocityX(0);
        }

        if (cursors.up.isDown && player.body.touching.down) {
            player.setVelocityY(-330);
        }
    }

</script>

</body>
</html>
